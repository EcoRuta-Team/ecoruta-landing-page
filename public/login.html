<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoRuta - Login</title>

    <link rel="stylesheet" href="assets/styles/login.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="background">

        <div class="logo-container">

            <img src="assets/images/ecoruta.png" alt="EcoRuta">
        
        </div>

        <div class="login-card">

            <div class="left-side">

                <h2>
                    Bienvenido <br>
                    a EcoRuta
                </h2>

                <div class="line"></div>

                <p>
                    Inicia sesión para acceder a rutas saludables,
                    alertas ambientales y recomendaciones personalizadas.
                </p>

                <img src="assets/images/ciudad.png" alt="Ciudad" class="city-image">

            </div>

            <div class="right-side">

                <form>

                    <label>Correo electrónico</label>

                    <input type="email" placeholder="Ingresa tu correo electrónico">

                    <label>Contraseña</label>

                    <input type="password" placeholder="Ingresa tu contraseña">

                    <a href="#" class="forgot">
                        ¿Olvidaste tu contraseña?
                    </a>

                    <button type="submit">
                        Iniciar sesión
                    </button>

                    <div class="separator">
                        <span>o</span>
                    </div>

                    <p class="register-text">
                        ¿No tienes una cuenta?
                    </p>

                    <a href="#" class="register-link">
                        Regístrate aquí
                    </a>

                </form>

            </div>

        </div>

        <div class="footer-text">
            💚 Tu salud es nuestra prioridad
            <small>Rutas más limpias, ciudades más saludables 🌿</small>
        </div>

    </div>

</body>

</html>
